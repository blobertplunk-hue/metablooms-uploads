<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puppy Puzzle Reading Game</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
.container{display:flex;flex-wrap:wrap;padding:10px;gap:10px}
.panel{background:#111827;padding:10px;border-radius:10px;flex:1;min-width:300px}
.piece{width:80px;height:80px;border:2px solid #374151;border-radius:8px;display:flex;align-items:center;justify-content:center;background:#1f2937;margin:5px;cursor:pointer}
.selected{outline:3px solid yellow}
.board{position:relative;width:320px;height:320px;background:url('https://upload.wikimedia.org/wikipedia/commons/6/6e/Golde33443.jpg') center/cover;border-radius:10px;margin:auto}
.slot{position:absolute;width:80px;height:80px;border:2px dashed #fff;display:flex;align-items:center;justify-content:center;font-size:10px;text-align:center}
.correct{border-color:#22c55e}
.wrong{border-color:#ef4444}
.feedback{min-height:20px;margin-top:10px}
</style>
</head>
<body>

<div class="container">

<div class="panel">
<h3>Pieces</h3>
<div id="pieces"></div>
<div class="feedback" id="feedback"></div>
</div>

<div class="panel">
<h3>Puzzle Board</h3>
<div class="board" id="board">
<div class="slot" data-type="action" style="top:0;left:0">Action</div>
<div class="slot" data-type="feeling" style="top:0;right:0">Feeling</div>
<div class="slot" data-type="description" style="bottom:0;left:0">Description</div>
<div class="slot" data-type="idea" style="bottom:0;right:0">Idea</div>
</div>
</div>

</div>

<script>

const DATA=[
{text:"runs and jumps",type:"action"},
{text:"truly adore",type:"feeling"},
{text:"cute",type:"description"},
{text:"Dogs are the best",type:"idea"}
];

let selected=null;

// render pieces
const container=document.getElementById("pieces");
DATA.forEach((p,i)=>{
let div=document.createElement("div");
div.className="piece";
div.innerText=p.text;
div.onclick=()=>selectPiece(div,i);
container.appendChild(div);
});

function selectPiece(el,i){
document.querySelectorAll(".piece").forEach(p=>p.classList.remove("selected"));
el.classList.add("selected");
selected=i;
setFeedback("Place the piece on the correct part of the puzzle.");
}

document.querySelectorAll(".slot").forEach(slot=>{
slot.onclick=()=>placePiece(slot);
});

function placePiece(slot){
if(selected===null){setFeedback("Select a piece first.");return;}
let piece=DATA[selected];

if(piece.type===slot.dataset.type){
slot.innerText=piece.text;
slot.classList.add("correct");
setFeedback("Correct! That fits.");
}else{
slot.classList.add("wrong");
setTimeout(()=>slot.classList.remove("wrong"),300);
setFeedback("Try again. That doesn't match.");
}

selected=null;
document.querySelectorAll(".piece").forEach(p=>p.classList.remove("selected"));
}

function setFeedback(msg){
document.getElementById("feedback").innerText=msg;
}

</script>

</body>
</html>
