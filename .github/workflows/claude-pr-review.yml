name: Claude PR Review

# Triggered when someone comments "@.claude" on an issue or pull request comment.
# Claude checks out the repo, reviews the code, and posts a comment with its analysis.

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  claude-review:
    # Only run when the comment contains "@.claude" and the author has write access.
    if: |
      contains(github.event.comment.body, '@.claude') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Extract review request from comment
        id: extract
        run: |
          # Strip "@.claude" prefix; remainder is the review instruction
          INSTRUCTION=$(echo "$COMMENT_BODY" | sed 's/@\.claude//' | xargs)
          if [[ -z "$INSTRUCTION" ]]; then
            INSTRUCTION="Review this pull request for correctness, security, and code quality."
          fi
          echo "instruction=$INSTRUCTION" >> "$GITHUB_OUTPUT"
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}

      - name: Run Claude Code review
        id: review
        run: |
          # Run Claude in non-interactive mode with the extracted instruction.
          # Output is captured and posted back as a GitHub comment.
          REVIEW=$(claude --print --no-stream \
            --system "You are a Staff Engineer performing a code review. Be concise, specific, and actionable. Format your response as markdown." \
            "${{ steps.extract.outputs.instruction }}" 2>&1) || true
          # Escape for GitHub Actions multiline output
          {
            echo "result<<CLAUDE_EOF"
            echo "$REVIEW"
            echo "CLAUDE_EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const review = `${{ steps.review.outputs.result }}`;
            const body = [
              '## Claude Code Review',
              '',
              `> Triggered by: @${context.payload.comment.user.login}`,
              `> Instruction: \`${{ steps.extract.outputs.instruction }}\``,
              '',
              review,
              '',
              '---',
              '*This review was generated by [Claude Code](https://claude.ai/code). Verify all suggestions before applying.*'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
